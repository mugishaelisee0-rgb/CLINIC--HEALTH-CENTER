<body >
<header>
<img src="logo.png" control width="40" height="40" alt="Health Clinic Center Logo">
 <h1>Welcome to Health Clinic Center</h1>

<nav>
        <button><a href="index.html">Home</a></button>
        <button><a href="about.html">About Us</a></button>

        <button><a href="setting.html">Setting</a></button>

        <main class="main-content">
            <div class="settings-card">
                <h2>System Settings</h2>
                
                <div class="setting-item">
                    <p>Appearance Mode</p>
                    <div class="mode-buttons">
                        <button onclick="setDarkMode(false)" class="mode-btn">Light</button>
                        <button onclick="setDarkMode(true)" class="mode-btn dark">Dark</button>
                    </div>
                </div>

                <hr>

                <div class="setting-item">
                    <p>Text Size</p>
                    <div class="font-buttons">
                        <button onclick="changeFontSize('small')">A</button>
                        <button onclick="changeFontSize('medium')">A+</button>
                        <button onclick="changeFontSize('large')">A++</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
<div class="setting-item">
    <div class="setting-label">
        <span class="material-icons">send</span>
        <p>Sent Messages</p>
    </div>
    
    <div id="messageLog" class="message-log">
        <p id="emptyNote" style="font-size: 10px; opacity: 0.6; text-align: center;">hy

        </p>
    </div>
    
    <button onclick="clearLogs()" class="clear-btn">Clear History</button>
</div>
    <script>
        function setDarkMode(isDark) {
            if (isDark) {
                document.body.classList.add('dark-mode');
                document.body.classList.remove('light-mode');
            } else {
                document.body.classList.add('light-mode');
                document.body.classList.remove('dark-mode');
            }
        }

        function changeFontSize(size) {
            const root = document.documentElement;
            if (size === 'small') root.style.fontSize = '24px';
            if (size === 'medium') root.style.fontSize = '46px';
            if (size === 'large') root.style.fontSize = '80px';
        }
    </script>
